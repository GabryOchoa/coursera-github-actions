name: hola-mundo #Nombre del workflow
on: #Event through push
  push:
    branches: ["main","master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: configure node.js
        uses: actions/setup-node@v4
        with:
          node-verion: '20'

      - name: execute script
        run: node hola_mundo.js
      
